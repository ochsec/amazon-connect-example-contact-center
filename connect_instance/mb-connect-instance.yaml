AWSTemplateFormatVersion: 2010-09-09
Description: Connect Instance for Example Contact Center

Parameters:
    InstanceAlias:
        Type: String
        Description: The alias the Connect Instance
        Default: monopoly-bank

    ConnectBucketName:
        Type: String
        Description: The name of the bucket to be used for the storage configs

Resources:
    MBKMSKey:
        Type: AWS::KMS::Key
        Properties:
            Description: KMS key for Kinesis Video Streams
            KeyPolicy:
                Version: "2012-10-17"
                Id: mb-kvs-kms-key
                Statement:
                    - Sid: Enable IAM User Permissions
                      Effect: Allow
                      Principal:
                          AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
                      Action: kms:*
                      Resource: "*"
                    - Sid: Allow Kinesis Video Streams to use the key
                      Effect: Allow
                      Principal:
                          Service: kinesisvideo.amazonaws.com
                      Action:
                          - kms:Encrypt
                          - kms:Decrypt
                          - kms:ReEncrypt*
                          - kms:GenerateDataKey*
                          - kms:DescribeKey
                      Resource: "*"

    MBConnectInstance:
        Type: AWS::Connect::Instance
        DependsOn: MBKMSKey
        Properties:
            Attributes:
                InboundCalls: true
                OutboundCalls: true
            IdentityManagementType: CONNECT_MANAGED
            InstanceAlias: !Ref InstanceAlias

    MBConnectInstanceContactTraceStorageConfig:
        Type: AWS::Connect::InstanceStorageConfig
        Properties:
            InstanceArn: !Ref MBConnectInstance
            StorageType: S3
            ResourceType: CHAT_TRANSCRIPTS
            S3Config:
                BucketName: !Ref ConnectBucketName
                BucketPrefix: contact-trace/

    MBConnectInstanceVoiceRecordingStorageConfig:
        Type: AWS::Connect::InstanceStorageConfig
        Properties:
            InstanceArn: !Ref MBConnectInstance
            StorageType: S3
            ResourceType: CALL_RECORDINGS
            S3Config:
                BucketName: !Ref ConnectBucketName
                BucketPrefix: voice-recording/

    MBConnectInstanceLiveMediaStreamStorageConfig:
        Type: AWS::Connect::InstanceStorageConfig
        Properties:
            InstanceArn: !Ref MBConnectInstance
            StorageType: KINESIS_VIDEO_STREAM
            ResourceType: MEDIA_STREAMS
            KinesisVideoStreamConfig:
                Prefix: media
                RetentionPeriodHours: 2
                EncryptionConfig:
                    EncryptionType: KMS
                    KeyId: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${MBKMSKey}"
